<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>よりそいAI</title>
</head>
<body>

<h1>よりそいAI</h1>
<button id="start">会話スタート</button>
<button id="stop">会話ストップ</button>

<script>
let audioContext, processor, input, stream;
let audioData = [];
let isRecording = false;
let startTime = 0;

async function startRecording() {
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  await audioContext.resume();

  input = audioContext.createMediaStreamSource(stream);
  processor = audioContext.createScriptProcessor(4096, 1, 1);

  audioData = [];

  processor.onaudioprocess = e => {
    if (!isRecording) return;
    audioData.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };

  input.connect(processor);
  processor.connect(audioContext.destination);

  isRecording = true;
  startTime = Date.now();
}

async function stopRecording() {
  if (!isRecording) return;

  isRecording = false;

  const duration = Date.now() - startTime;
  if (duration < 1500) return;

  processor.disconnect();
  input.disconnect();
  stream.getTracks().forEach(t => t.stop());

  const blob = encodeWAV(audioData, audioContext.sampleRate);

  if (blob.size > 1000000) return; // デカすぎ防止

  await sendToServer(blob);
}

function encodeWAV(samples, sampleRate) {
  let length = samples.reduce((a, b) => a + b.length, 0);
  let buffer = new ArrayBuffer(44 + length * 2);
  let view = new DataView(buffer);

  const write = (o, s) => s.split("").forEach((c,i)=>view.setUint8(o+i,c.charCodeAt(0)));

  write(0,"RIFF");
  view.setUint32(4,36+length*2,true);
  write(8,"WAVE");
  write(12,"fmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  write(36,"data");
  view.setUint32(40,length*2,true);

  let offset=44;
  samples.forEach(s=>{
    s.forEach(v=>{
      view.setInt16(offset,Math.max(-1,Math.min(1,v))*32767,true);
      offset+=2;
    });
  });

  return new Blob([view],{type:"audio/wav"});
}

async function sendToServer(blob) {
  const fd = new FormData();
  fd.append("audio", blob, "voice.wav");

  const res = await fetch("/upload",{method:"POST",body:fd});

  if (!res.ok) return console.error("server error");

  const audio = new Audio(URL.createObjectURL(await res.blob()));
  audio.play();
}

start.onclick = startRecording;
stop.onclick = stopRecording;
</script>

</body>
</html>
