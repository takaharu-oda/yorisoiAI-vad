<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>よりそいAI</title>
</head>
<body>

<h1>よりそいAI</h1>
<button id="start">会話スタート</button>
<button id="stop">会話ストップ</button>

<script>
let audioContext;
let processor;
let input;
let globalStream;
let isRecording = false;
let audioData = [];

// ===== 録音開始 =====
async function startRecording() {
  globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  input = audioContext.createMediaStreamSource(globalStream);

  processor = audioContext.createScriptProcessor(4096, 1, 1);

  processor.onaudioprocess = (e) => {
    if (!isRecording) return;
    const channelData = e.inputBuffer.getChannelData(0);
    audioData.push(new Float32Array(channelData));
  };

  input.connect(processor);
  processor.connect(audioContext.destination);

  isRecording = true;
}

// ===== 録音停止 =====
async function stopRecording() {
  isRecording = false;

  processor.disconnect();
  input.disconnect();
  globalStream.getTracks().forEach(t => t.stop());

  const wavBlob = encodeWAV(audioData, audioContext.sampleRate);

  audioData = [];

  await sendToServer(wavBlob);
}

// ===== WAV変換 =====
function encodeWAV(samples, sampleRate) {
  let bufferLength = samples.reduce((acc, cur) => acc + cur.length, 0);
  let buffer = new ArrayBuffer(44 + bufferLength * 2);
  let view = new DataView(buffer);

  writeString(view, 0, "RIFF");
  view.setUint32(4, 36 + bufferLength * 2, true);
  writeString(view, 8, "WAVE");
  writeString(view, 12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(view, 36, "data");
  view.setUint32(40, bufferLength * 2, true);

  let offset = 44;
  for (let i = 0; i < samples.length; i++) {
    let sample = samples[i];
    for (let j = 0; j < sample.length; j++) {
      let s = Math.max(-1, Math.min(1, sample[j]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }

  return new Blob([view], { type: "audio/wav" });
}

function writeString(view, offset, str) {
  for (let i = 0; i < str.length; i++) {
    view.setUint8(offset + i, str.charCodeAt(i));
  }
}

// ===== サーバー送信 =====
async function sendToServer(blob) {
  const formData = new FormData();
  formData.append("audio", blob, "voice.wav");

  const res = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  if (!res.ok) {
    console.error("❌ server error");
    return;
  }

  const audioBlob = await res.blob();

  if (audioBlob.size === 0) {
    console.error("❌ empty audio");
    return;
  }

  const audioUrl = URL.createObjectURL(audioBlob);
  const audio = new Audio(audioUrl);

  try {
    await audio.play();
  } catch (e) {
    console.error("❌ audio play failed", e);
  }
}

// ===== ボタン =====
document.getElementById("start").onclick = async () => {
  await startRecording();

  setTimeout(() => {
    stopRecording();
  }, 4000); // 少し長め
};

document.getElementById("stop").onclick = () => {
  stopRecording();
};
</script>

</body>
</html>
