<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>よりそいAI（VAD安定版）</title>
</head>
<body>

<h1>よりそいAI</h1>
<button id="start">会話スタート</button>
<button id="stop">停止</button>

<script>
let audioContext;
let analyser;
let dataArray;
let stream;

let mediaRecorder;
let audioChunks = [];

let isRunning = false;
let isPlaying = false;

let silenceStart = null;
let speakStart = null;
let recordStartTime = 0;
let hasSpoken = false;

// ===== 調整パラメータ（ここ重要）=====
const THRESHOLD = 0.02;     // 無音
const SPEAK_MIN = 0.08;     // 発話（強めにした）
const SILENCE_TIME = 800;
const MIN_RECORD_TIME = 800;

// ===== スタート =====
document.getElementById("start").onclick = async () => {
  if (isRunning) return;

  console.log("🚀 開始");

  isRunning = true;

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioContext.createMediaStreamSource(stream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;

  source.connect(analyser);
  dataArray = new Uint8Array(analyser.fftSize);

  startRecording();
};

// ===== 停止 =====
document.getElementById("stop").onclick = () => {
  isRunning = false;
  stream?.getTracks().forEach(t => t.stop());
  mediaRecorder?.stop();
};

// ===== 録音開始 =====
function startRecording() {
  if (!isRunning || isPlaying) return;

  console.log("🎤 録音開始");

  audioChunks = [];
  hasSpoken = false;
  silenceStart = null;
  speakStart = null;
  recordStartTime = Date.now();

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    const duration = Date.now() - recordStartTime;

    if (!hasSpoken) {
      console.log("❌ 無音スキップ");
      restart();
      return;
    }

    if (duration < MIN_RECORD_TIME) {
      console.log("❌ 短すぎ");
      restart();
      return;
    }

    const blob = new Blob(audioChunks, { type: "audio/webm" });

    console.log("📦 size:", blob.size);

    await sendToServer(blob);
  };

  mediaRecorder.start(100);
  detect();
}

// ===== VAD =====
function detect() {
  if (!isRunning || isPlaying) return;

  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }

  const volume = Math.sqrt(sum / dataArray.length);

  // 🔥 発話判定（連続200ms必要）
  if (volume > SPEAK_MIN) {
    if (!speakStart) speakStart = Date.now();

    if (Date.now() - speakStart > 200) {
      hasSpoken = true;
    }
  } else {
    speakStart = null;
  }

  // 🔇 無音判定
  if (volume < THRESHOLD) {
    if (!silenceStart) silenceStart = Date.now();

    if (
      hasSpoken &&
      Date.now() - silenceStart > SILENCE_TIME &&
      Date.now() - recordStartTime > MIN_RECORD_TIME
    ) {
      console.log("🔇 stop");
      mediaRecorder.stop();
      return;
    }
  } else {
    silenceStart = null;
  }

  requestAnimationFrame(detect);
}

// ===== サーバー送信 =====
async function sendToServer(blob) {
  console.log("📤 送信");

  const fd = new FormData();
  fd.append("audio", blob);

  const res = await fetch("/api/voice", {
    method: "POST",
    body: fd
  });

  if (!res.ok) {
    console.error("❌ server error");
    restart();
    return;
  }

  const audioBlob = await res.blob();

  if (audioBlob.size === 0) {
    console.error("❌ empty audio");
    restart();
    return;
  }

  const url = URL.createObjectURL(audioBlob);
  const audio = new Audio(url);

  isPlaying = true;

  audio.onended = () => {
    isPlaying = false;
    restart();
  };

  try {
    await audio.play();
  } catch (e) {
    console.error("❌ 再生失敗", e);
    isPlaying = false;
    restart();
  }
}

// ===== 再スタート =====
function restart() {
  if (!isRunning) return;
  startRecording();
}
</script>

</body>
</html>
