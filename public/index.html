<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>よりそいAI（VAD）</title>
</head>
<body>

<h1>よりそいAI（VAD）</h1>
<button id="start">会話スタート</button>
<button id="stop">会話ストップ</button>

<script>
let mediaRecorder;
let audioChunks = [];
let audioContext;
let analyser;
let dataArray;
let stream;
let audioPlayer;

let silenceStart = null;
let sentEarly = false;
let isManualStop = false;
let isRunning = false;

const params = new URLSearchParams(window.location.search);
const userName = params.get("name") || "ともだち";

const THRESHOLD = 0.005;

// ===== START =====
document.getElementById("start").onclick = async () => {
  if (isRunning) return;

  console.log("🚀 開始");
  isRunning = true;
  isManualStop = false;

  // 音アンロック（重要）
  audioContext = new AudioContext();
  await audioContext.resume();

  audioPlayer = new Audio();

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  source.connect(analyser);

  dataArray = new Uint8Array(analyser.fftSize);

  startRecording();
};

// ===== STOP =====
document.getElementById("stop").onclick = () => {
  console.log("⛔ 停止");

  isManualStop = true;
  isRunning = false;

  mediaRecorder?.stop();
  stream?.getTracks().forEach(t => t.stop());
};

// ===== 録音開始 =====
function startRecording() {
  audioChunks = [];

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

  mediaRecorder.onstop = async () => {

    if (isManualStop) {
      console.log("手動停止 → 何もしない");
      return;
    }

    console.log("📤 自動送信");

    const blob = new Blob(audioChunks, { type: "audio/webm" });

    if (blob.size < 1000) {
      restart();
      return;
    }

    const formData = new FormData();
    formData.append("audio", blob);
    formData.append("name", userName);

    const res = await fetch("/api/voice", {
      method: "POST",
      body: formData
    });

    const url = URL.createObjectURL(await res.blob());

    audioPlayer.src = url;
    await audioPlayer.play().catch(e => console.log("再生エラー", e));

    restart();
  };

  mediaRecorder.start();
  detect();
}

// ===== 再スタート =====
function restart() {
  if (!isRunning) return;

  setTimeout(() => {
    silenceStart = null;
    sentEarly = false;
    startRecording();
  }, 300);
}

// ===== VAD =====
function detect() {
  if (!isRunning) return;

  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }

  const volume = Math.sqrt(sum / dataArray.length);

  // フライング送信
  if (volume < THRESHOLD && !sentEarly && audioChunks.length > 10) {
    sentEarly = true;
    mediaRecorder.stop();
    return;
  }

  // 無音検知
  if (volume < THRESHOLD) {
    if (!silenceStart) silenceStart = Date.now();

    if (Date.now() - silenceStart > 800) {
      mediaRecorder.stop();
      return;
    }
  } else {
    silenceStart = null;
  }

  requestAnimationFrame(detect);
}
</script>

</body>
</html>
