<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>よりそいAI シンプル版</title>
</head>
<body>

<h2>よりそいAI（スマホ対応）</h2>
<button id="record">🎤 録音（3秒）</button>

<script>
let audioContext;
let unlockedAudio = null;

document.getElementById("record").onclick = async () => {

  // 🔥 再生権限解除（最重要）
  unlockedAudio = new Audio();
  unlockedAudio.muted = true;

  try {
    await unlockedAudio.play();
    console.log("🔓 unlocked");
  } catch (e) {
    console.log("unlock失敗", e);
  }

  // 🔥 iPhone用
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  await audioContext.resume();

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true
    }
  });

  const mediaRecorder = new MediaRecorder(stream);
  let chunks = [];

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {

    const blob = new Blob(chunks, { type: "audio/webm" });

    const fd = new FormData();
    fd.append("audio", blob);

    console.log("📤 送信");

    const res = await fetch("/api/voice", {
      method: "POST",
      body: fd
    });

    if (!res.ok) {
      console.error("❌ server error");
      return;
    }

    const audioBlob = await res.blob();
    console.log("🔊 size:", audioBlob.size);

    if (audioBlob.size === 0) {
      console.error("❌ empty audio");
      return;
    }

    const url = URL.createObjectURL(audioBlob);

    // 🔥 同じAudioを使う（超重要）
    const audio = unlockedAudio || new Audio();

    audio.src = url;
    audio.muted = false;
    audio.currentTime = 0;
    audio.volume = 1;

    audio.setAttribute("playsinline", "true");
    audio.setAttribute("webkit-playsinline", "true");

    try {
      await audio.play();
      console.log("▶ 再生成功");
    } catch (e) {
      console.error("❌ 再生失敗", e);
    }
  };

  mediaRecorder.start();

  console.log("🎤 録音開始");

  setTimeout(() => {
    mediaRecorder.stop();
    stream.getTracks().forEach(t => t.stop());
    console.log("🛑 録音停止");
  }, 3000);
};
</script>

</body>
</html>
