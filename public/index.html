<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>よりそいAI</title>
</head>
<body>

<h2>よりそいAI</h2>

<!-- 名前設定 -->
<input id="names" placeholder="たろう,はなこ">
<button id="save">保存</button>

<br><br>

<button id="start">▶ 会話スタート</button>
<button id="stop">■ 停止</button>

<script>
let audioContext;
let isRunning = false;
let currentStream = null;

// ===== 名前保存 =====
document.getElementById("save").onclick = () => {
  const names = document.getElementById("names").value;
  localStorage.setItem("familyNames", names);
  alert("保存したよ！");
};

// ===== 起動時に復元 =====
window.onload = () => {
  const saved = localStorage.getItem("familyNames");
  if (saved) {
    document.getElementById("names").value = saved;
  }
};

// ===== START =====
document.getElementById("start").onclick = async () => {
  if (isRunning) return;

  isRunning = true;

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  await audioContext.resume();

  console.log("🚀 会話スタート");

  startLoop();
};

// ===== STOP =====
document.getElementById("stop").onclick = () => {
  isRunning = false;

  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
  }
};

// ===== ループ =====
async function startLoop() {
  if (!isRunning) return;

  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    const mediaRecorder = new MediaRecorder(currentStream);
    let chunks = [];

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      if (!isRunning) return;

      const blob = new Blob(chunks, { type: "audio/webm" });

      const fd = new FormData();
      fd.append("audio", blob);

      // 🔥 名前送信
      const names = document.getElementById("names").value;
      if (names) fd.append("names", names);

      const res = await fetch("/api/voice", {
        method: "POST",
        body: fd
      });

      if (res.status === 204) {
        return startLoop();
      }

      const audioBlob = await res.blob();

      if (audioBlob.size < 1000) {
        return startLoop();
      }

      // 🔥 スマホ対応再生
      const arrayBuffer = await audioBlob.arrayBuffer();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioContext.destination);

      source.start();

      source.onended = () => {
        startLoop();
      };
    };

    mediaRecorder.start();

    setTimeout(() => {
      mediaRecorder.stop();
      currentStream.getTracks().forEach(t => t.stop());
    }, 3000);

  } catch (e) {
    console.error(e);
  }
}
</script>

</body>
</html>
