<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>よりそいAI</title>
</head>
<body>

<h1>よりそいAI</h1>
<button id="start">会話スタート</button>
<button id="stop">会話ストップ</button>

<script>
let mediaRecorder;
let audioChunks = [];
let audioContext;
let analyser;
let dataArray;
let stream;
let audioPlayer;

let isRunning = false;
let isPlaying = false;
let recordStartTime = 0;

const userName = new URLSearchParams(window.location.search).get("name");

// 🔥 とにかく拾う設定
const THRESHOLD = 0.003;
const RECORD_TIME = 3000;

// ===== START =====
document.getElementById("start").onclick = async () => {
  if (isRunning) return;

  isRunning = true;

  audioContext = new AudioContext();
  await audioContext.resume();

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioPlayer = new Audio();

  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  source.connect(analyser);

  dataArray = new Uint8Array(analyser.fftSize);

  startRecording();
};

// ===== STOP =====
document.getElementById("stop").onclick = () => {
  isRunning = false;
  mediaRecorder?.stop();
  stream?.getTracks().forEach(t => t.stop());
};

// ===== 録音 =====
function startRecording() {
  if (!isRunning) return;

  audioChunks = [];
  recordStartTime = Date.now();

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: "audio/webm" });

    const formData = new FormData();
    formData.append("audio", blob);
    formData.append("name", userName || "");

    const res = await fetch("/api/voice", {
      method: "POST",
      body: formData
    });

    if (!res.ok) {
      console.log("❌ サーバー:", await res.text());
      restart();
      return;
    }

    const contentType = res.headers.get("content-type");
    if (!contentType || !contentType.includes("audio")) {
      restart();
      return;
    }

    const blobRes = await res.blob();

    if (blobRes.size < 1000) {
      restart();
      return;
    }

    const url = URL.createObjectURL(blobRes);

    isPlaying = true;

    audioPlayer.src = url;
    await audioPlayer.play().catch(() => {});

    audioPlayer.onended = () => {
      isPlaying = false;
      restart();
    };
  };

  mediaRecorder.start();

  // 🔥 強制送信（まず確実に動かす）
  setTimeout(() => {
    mediaRecorder.stop();
  }, RECORD_TIME);

  detect();
}

// ===== 再スタート =====
function restart() {
  if (!isRunning || isPlaying) return;
  startRecording();
}

// ===== VAD（ログ用） =====
function detect() {
  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }

  const volume = Math.sqrt(sum / dataArray.length);
  console.log("volume:", volume);

  if (isRunning) requestAnimationFrame(detect);
}
</script>

</body>
</html>
