<!DOCTYPE html>
<html>
<body>

<h2>よりそいAI（VAD）</h2>

<button id="start">会話スタート</button>
<button id="stop">会話ストップ</button>

<script>
let audioContext;
let analyser;
let micStream;
let mediaRecorder;
let chunks = [];

let recording = false;
let silenceStart = null;
let audioPlayer = null;
let isPlaying = false;
let isProcessing = false;
let isActive = false; // 👈 会話ON/OFF

function getUserId() {
  let id = localStorage.getItem("userId");
  if (!id) {
    id = "user_" + Math.random().toString(36).slice(2);
    localStorage.setItem("userId", id);
  }
  return id;
}

// ===== スタート =====
document.getElementById("start").onclick = async () => {

  if (isActive) return;

  isActive = true;

  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(micStream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;

  source.connect(analyser);

  detectVoice();
};

// ===== ストップ =====
document.getElementById("stop").onclick = () => {

  isActive = false;

  if (mediaRecorder && recording) {
    mediaRecorder.stop();
  }

  if (audioPlayer) {
    audioPlayer.pause();
  }

  if (micStream) {
    micStream.getTracks().forEach(track => track.stop());
  }

  console.log("🛑 会話停止");
};

// ===== VAD =====
function detectVoice() {

  if (!isActive) return;

  if (isPlaying || isProcessing) {
    requestAnimationFrame(detectVoice);
    return;
  }

  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);

  let volume = 0;
  for (let i = 0; i < data.length; i++) {
    volume += Math.abs(data[i] - 128);
  }
  volume = volume / data.length;

  const threshold = 20;

  if (volume > threshold) {
    silenceStart = null;

    if (!recording) {
      startRecording();
    }

  } else {
    if (recording) {
      if (!silenceStart) {
        silenceStart = Date.now();
      } else {
        if (Date.now() - silenceStart > 1500) {
          stopRecording();
        }
      }
    }
  }

  requestAnimationFrame(detectVoice);
}

// ===== 録音開始 =====
function startRecording() {
  console.log("🎤 録音開始");

  mediaRecorder = new MediaRecorder(micStream, {
    mimeType: "audio/webm;codecs=opus"
  });

  chunks = [];
  recording = true;

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  mediaRecorder.onstop = sendAudio;

  mediaRecorder.start();
}

// ===== 録音停止 =====
function stopRecording() {
  console.log("⏹ 録音停止");
  recording = false;
  mediaRecorder.stop();
}

// ===== 送信 =====
async function sendAudio() {

  const blob = new Blob(chunks, { type: "audio/webm;codecs=opus" });

  if (blob.size < 2000) {
    console.log("無音スキップ");
    return;
  }

  isProcessing = true;

  const formData = new FormData();
  formData.append("audio", blob);
  formData.append("userId", getUserId());
  formData.append("name", "ふうと");
  formData.append("gender", "boy");

  console.log("📡 送信");

  const res = await fetch("/api/voice", {
    method: "POST",
    body: formData
  });

  const audioBlob = await res.blob();

  if (audioPlayer) audioPlayer.pause();

  const url = URL.createObjectURL(audioBlob);
  audioPlayer = new Audio(url);

  isPlaying = true;

  audioPlayer.onended = () => {
    isPlaying = false;
    isProcessing = false;
    console.log("再生終了");
  };

  try {
    await audioPlayer.play();
    console.log("🔊 再生");
  } catch (e) {
    console.log("再生エラー", e);
    isPlaying = false;
    isProcessing = false;
  }
}
</script>

</body>
</html>
