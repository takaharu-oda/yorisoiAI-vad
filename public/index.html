<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>よりそいAI（VAD）</title>
</head>
<body>

<h1>よりそいAI（VAD）</h1>
<button id="start">会話スタート</button>
<button id="stop">会話ストップ</button>

<script>
let mediaRecorder;
let audioChunks = [];
let audioContext;
let analyser;
let dataArray;
let stream;
let audioPlayer;

let silenceStart = null;
let sentEarly = false;
let isManualStop = false;
let isRunning = false;
let recordStartTime = 0;

const params = new URLSearchParams(window.location.search);
const userName = params.get("name") || "ともだち";

// 🔥 調整済みパラメータ
const THRESHOLD = 0.01;
const SILENCE_TIME = 1200;
const MIN_RECORD_TIME = 800;

// ===== START =====
document.getElementById("start").onclick = async () => {
  if (isRunning) return;

  console.log("🚀 開始");
  isRunning = true;
  isManualStop = false;

  try {
    audioContext = new AudioContext();
    await audioContext.resume();

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log("マイク取得OK");

  } catch (e) {
    console.error("マイクエラー:", e);
    alert("マイク許可して！");
    isRunning = false;
    return;
  }

  audioPlayer = new Audio();

  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  source.connect(analyser);

  dataArray = new Uint8Array(analyser.fftSize);

  startRecording();
};

// ===== STOP =====
document.getElementById("stop").onclick = () => {
  console.log("⛔ 停止");

  isManualStop = true;
  isRunning = false;

  mediaRecorder?.stop();
  stream?.getTracks().forEach(t => t.stop());
};

// ===== 録音 =====
function startRecording() {
  console.log("🎤 録音開始");

  audioChunks = [];
  recordStartTime = Date.now();

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

  mediaRecorder.onstop = async () => {

    if (isManualStop) {
      console.log("手動停止 → 何もしない");
      return;
    }

    const duration = Date.now() - recordStartTime;

    if (duration < MIN_RECORD_TIME) {
      console.log("短すぎてスキップ");
      restart();
      return;
    }

    console.log("📤 送信");

    const blob = new Blob(audioChunks, { type: "audio/webm" });

    const formData = new FormData();
    formData.append("audio", blob);
    formData.append("name", userName);

    const res = await fetch("/api/voice", {
      method: "POST",
      body: formData
    });

    const url = URL.createObjectURL(await res.blob());

    audioPlayer.src = url;
    await audioPlayer.play().catch(e => console.log("再生エラー", e));

    restart();
  };

  mediaRecorder.start();
  detect();
}

// ===== 再スタート =====
function restart() {
  if (!isRunning) return;

  setTimeout(() => {
    silenceStart = null;
    sentEarly = false;
    startRecording();
  }, 300);
}

// ===== VAD =====
function detect() {
  if (!isRunning) return;

  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }

  const volume = Math.sqrt(sum / dataArray.length);

  // 無音判定
  if (volume < THRESHOLD) {
    if (!silenceStart) silenceStart = Date.now();

    if (
      Date.now() - silenceStart > SILENCE_TIME &&
      Date.now() - recordStartTime > MIN_RECORD_TIME
    ) {
      console.log("🔇 無音 → 送信");
      mediaRecorder.stop();
      return;
    }
  } else {
    silenceStart = null;
  }

  requestAnimationFrame(detect);
}
</script>

</body>
</html>
