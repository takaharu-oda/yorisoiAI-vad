<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>よりそいAI（VAD）</title>
</head>
<body>
  <h1>よりそいAI（VAD）</h1>
  <button id="start">会話スタート</button>
  <button id="stop">会話ストップ</button>

<script>
let mediaRecorder;
let audioChunks = [];
let audioContext;
let analyser;
let dataArray;
let stream;
let audioPlayer; // ← 重要

let silenceStart = null;
let sentEarly = false;

// ===== 名前取得 =====
const params = new URLSearchParams(window.location.search);
const userName = params.get("name") || "ともだち";

const THRESHOLD = 0.005;

// ===== スタート =====
document.getElementById("start").onclick = async () => {
  console.log("🚀 VAD開始");

  // 🔥 音再生許可を取得（超重要）
  audioPlayer = new Audio();
  audioPlayer.muted = false;

  try {
    await audioPlayer.play();
  } catch (e) {}
  audioPlayer.pause();

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  source.connect(analyser);

  dataArray = new Uint8Array(analyser.fftSize);

  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

  mediaRecorder.onstop = async () => {
    console.log("📤 送信");

    const blob = new Blob(audioChunks, { type: "audio/webm" });

    if (blob.size < 1000) {
      console.log("小さすぎてスキップ");
      restart();
      return;
    }

    const formData = new FormData();
    formData.append("audio", blob);
    formData.append("name", userName);

    const res = await fetch("/api/voice", {
      method: "POST",
      body: formData
    });

    const url = URL.createObjectURL(await res.blob());

    // 🔥 ここが修正ポイント
    audioPlayer.src = url;
    audioPlayer.play();

    restart();
  };

  mediaRecorder.start();
  detect();
};

// ===== ストップ =====
document.getElementById("stop").onclick = () => {
  console.log("⛔ 停止");
  mediaRecorder?.stop();
};

// ===== 再スタート =====
function restart() {
  setTimeout(() => {
    sentEarly = false;
    silenceStart = null;
    audioChunks = [];
    mediaRecorder.start();
    detect();
  }, 300);
}

// ===== VAD =====
function detect() {
  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }

  const volume = Math.sqrt(sum / dataArray.length);

  if (volume < THRESHOLD && !sentEarly && audioChunks.length > 10) {
    sentEarly = true;
    mediaRecorder.stop();
    return;
  }

  if (volume < THRESHOLD) {
    if (!silenceStart) silenceStart = Date.now();

    if (Date.now() - silenceStart > 700) {
      mediaRecorder.stop();
      return;
    }
  } else {
    silenceStart = null;
  }

  requestAnimationFrame(detect);
}
</script>
</body>
</html>
