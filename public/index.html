<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>よりそいAI（VAD）</title>
</head>
<body>

<h1>よりそいAI（VAD）</h1>
<button id="start">会話スタート</button>
<button id="stop">会話ストップ</button>

<script>
let mediaRecorder;
let audioChunks = [];
let audioContext;
let analyser;
let dataArray;
let stream;
let audioPlayer;

let silenceStart = null;
let isManualStop = false;
let isRunning = false;
let isPlaying = false;
let isRecording = false;
let recordStartTime = 0;

const params = new URLSearchParams(window.location.search);
const userName = params.get("name");

// ===== 調整値 =====
const THRESHOLD = 0.02;
const SILENCE_TIME = 800;
const MIN_RECORD_TIME = 500;

// ===== START =====
document.getElementById("start").onclick = async () => {
  if (isRunning) return;

  console.log("🚀 開始");
  isRunning = true;
  isManualStop = false;

  try {
    audioContext = new AudioContext();
    await audioContext.resume();

    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    console.log("マイクOK");

  } catch (e) {
    alert("マイク許可して！");
    isRunning = false;
    return;
  }

  audioPlayer = new Audio();

  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  source.connect(analyser);

  dataArray = new Uint8Array(analyser.fftSize);

  // recorder準備だけ（まだ録音しない）
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

  mediaRecorder.onstop = handleStop;

  detect();
};

// ===== STOP =====
document.getElementById("stop").onclick = () => {
  console.log("⛔ 停止");

  isManualStop = true;
  isRunning = false;

  mediaRecorder?.stop();
  stream?.getTracks().forEach(t => t.stop());
};

// ===== 録音終了処理 =====
async function handleStop() {
  if (isManualStop) return;

  const duration = Date.now() - recordStartTime;
  if (duration < MIN_RECORD_TIME) {
    console.log("短すぎスキップ");
    restart();
    return;
  }

  console.log("📤 送信");

  const blob = new Blob(audioChunks, { type: "audio/webm" });

  const formData = new FormData();
  formData.append("audio", blob);
  formData.append("name", userName || "");

  const res = await fetch("/api/voice", {
    method: "POST",
    body: formData
  });

  // ===== エラー対策 =====
  if (!res.ok) {
    console.log("❌ サーバー:", await res.text());
    restart();
    return;
  }

  const contentType = res.headers.get("content-type");
  if (!contentType || !contentType.includes("audio")) {
    console.log("❌ 音声じゃない");
    restart();
    return;
  }

  const blobRes = await res.blob();

  if (blobRes.size < 1000) {
    console.log("❌ 小さい");
    restart();
    return;
  }

  const url = URL.createObjectURL(blobRes);

  isPlaying = true;

  audioPlayer.src = url;
  await audioPlayer.play().catch(e => console.log("再生エラー", e));

  audioPlayer.onended = () => {
    isPlaying = false;
    setTimeout(() => restart(), 300);
  };
}

// ===== 再スタート =====
function restart() {
  if (!isRunning || isPlaying) return;

  silenceStart = null;
  isRecording = false;
  audioChunks = [];
}

// ===== VAD =====
function detect() {
  if (!isRunning) return;

  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }

  const volume = Math.sqrt(sum / dataArray.length);
  console.log("volume:", volume);

  // ===== 話し始め =====
  if (!isRecording && !isPlaying && volume > THRESHOLD) {
    console.log("🗣️ 話し始め");

    isRecording = true;
    audioChunks = [];
    silenceStart = null;

    mediaRecorder.start();
    recordStartTime = Date.now();
  }

  // ===== 話し終わり =====
  if (isRecording) {
    if (volume < THRESHOLD = 0.003) {
      if (!silenceStart) silenceStart = Date.now();

      if (Date.now() - silenceStart > SILENCE_TIME) {
        console.log("🔇 話し終わり");

        isRecording = false;
        mediaRecorder.stop();
      }
    } else {
      silenceStart = null;
    }
  }

  requestAnimationFrame(detect);
}
</script>

</body>
</html>
